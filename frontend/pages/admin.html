<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — UHS Latin</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='../index.html'" style="cursor:pointer">UHS Latin</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="language.html">Language</a>
            <a href="literature.html">Literature</a>
            <a href="library.html">Library</a>
            <a href="class-review.html">Class Review</a>
            <a href="latin-club.html">Latin Club</a>
        </div>
    </nav>

    <!-- LOGIN PANEL (shown when logged out) -->
    <section class="admin-login" id="loginPanel">
        <div class="login-box">
            <h2>Admin Login</h2>
            <p>Restricted area. Authorised personnel only.</p>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="adminUsername" placeholder="admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="••••••••">
            </div>
            <button class="submit-btn" onclick="handleLogin()">Login</button>
            <p id="loginError" class="form-message" style="color:red"></p>
        </div>
    </section>

    <!-- ADMIN DASHBOARD (shown when logged in) -->
    <section class="admin-dashboard" id="dashboardPanel" style="display:none">
        <div class="dashboard-header">
            <h2>Admin Dashboard</h2>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="dashboard-section">
            <h3>Content Requests</h3>
            <p class="dashboard-subtitle">Submissions from the request form</p>
            <div id="requestsTable">
                <p>Loading...</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2025 UHS Latin Club · University High School</p>
    </footer>

    <script src="../js/api.js"></script>
    <script>
        // CHECK IF ALREADY LOGGED IN
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                showDashboard();
            }
        });

        async function handleLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const error = document.getElementById('loginError');
            try {
                await login(username, password);
                showDashboard();
            } catch (err) {
                error.textContent = 'Invalid username or password.';
            }
        }

        function handleLogout() {
            localStorage.removeItem('token');
            document.getElementById('dashboardPanel').style.display = 'none';
            document.getElementById('loginPanel').style.display = 'flex';
        }

        async function showDashboard() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            loadRequests();
        }

        async function loadRequests() {
            const container = document.getElementById('requestsTable');
            try {
                const requests = await getRequests();
                if (requests.length === 0) {
                    container.innerHTML = '<p>No requests yet!</p>';
                    return;
                }
                container.innerHTML = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Request</th>
                                <th>Email</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${requests.map(r => `
                                <tr>
                                    <td>${r.firstName} ${r.lastName}</td>
                                    <td>${r.latinClass}</td>
                                    <td>${r.request}</td>
                                    <td><a href="mailto:${r.email}">${r.email}</a></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                localStorage.removeItem('token');
                document.getElementById('dashboardPanel').style.display = 'none';
                document.getElementById('loginPanel').style.display = 'flex';
            }
        }
    </script>

</body>
</html>
